name: Update WIBOR rates

on:
  schedule:
    - cron: '30 16 * * 1-5' # pon-pt 16:30 UTC (po fixingu)
  workflow_dispatch: # ręczne uruchomienie

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Debug Stooq response
        run: |
          URL="https://stooq.com/q/d/l/?s=plopln1m&d1=20260325&d2=20260402&i=d"
          echo "URL: $URL"
          echo "--- HEADERS ---"
          curl -sD- -o /tmp/body -A "Mozilla/5.0 (compatible; wibor-bot/1.0)" "$URL"
          echo "--- BODY (first 500 bytes) ---"
          head -c 500 /tmp/body
          echo ""
          echo "--- BODY SIZE ---"
          wc -c < /tmp/body

      - name: Fetch WIBOR from Stooq
        run: bash fetch.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --cached --quiet || git commit -m "Update WIBOR rates $(date +%Y-%m-%d)"
          git push
